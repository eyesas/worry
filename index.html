<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสมาชิกสมบูรณ์แบบ</title>
    <style>
        body { font-family: 'Kanit', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #333; text-align: center; font-size: 24px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: #764ba2; outline: none; box-shadow: 0 0 5px rgba(118, 75, 162, 0.3); }
        button { width: 100%; padding: 13px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #218838; transform: translateY(-1px); }
        #btn-login { background: #667eea; }
        #btn-login:hover { background: #5a67d8; }
        .toggle-link { text-align: center; margin-top: 20px; font-size: 14px; color: #667eea; cursor: pointer; font-weight: 500; }
        .hidden { display: none; }
        .info-text { font-size: 13px; color: #777; margin-bottom: 15px; text-align: center; line-height: 1.4; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div id="register-form">
            <h2>สมัครสมาชิก</h2>
            <p class="info-text">กรอกข้อมูลเพื่อสร้างบัญชีใหม่</p>
            <input type="text" id="reg-username" placeholder="ชื่อผู้ใช้งาน (Display Name)" required>
            <input type="email" id="reg-email" placeholder="อีเมล (เช่น example@mail.com)" required>
            <input type="password" id="reg-password" placeholder="รหัสผ่าน (6 ตัวขึ้นไป)" required>
            <input type="password" id="reg-confirm-password" placeholder="ยืนยันรหัสผ่านอีกครั้ง" required>
            <button id="btn-register">สมัครและส่งเมลยืนยัน</button>
            <div class="toggle-link" onclick="toggleForm()">มีบัญชีอยู่แล้ว? เข้าสู่ระบบ</div>
        </div>

        <div id="login-form" class="hidden">
            <h2>เข้าสู่ระบบ</h2>
            <p class="info-text">กรุณายืนยันอีเมลก่อนเข้าสู่ระบบครั้งแรก</p>
            <input type="email" id="login-email" placeholder="อีเมล" required>
            <input type="password" id="login-password" placeholder="รหัสผ่าน" required>
            <button id="btn-login">เข้าสู่ระบบ</button>
            <div class="toggle-link" onclick="toggleForm()">ยังไม่มีบัญชี? สมัครสมาชิก</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC5HWgNuzuK7nZRWP01hDaxcLfy2GWjt18",
            authDomain: "bestwev-af0c6.firebaseapp.com",
            databaseURL: "https://bestwev-af0c6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bestwev-af0c6",
            storageBucket: "bestwev-af0c6.firebasestorage.app",
            messagingSenderId: "114869261413",
            appId: "1:114869261413:web:c2f7b34e75a03d7902a28c",
            measurementId: "G-DVFE8XJT4C"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.toggleForm = () => {
            document.getElementById('register-form').classList.toggle('hidden');
            document.getElementById('login-form').classList.toggle('hidden');
        };

        // --- ระบบสมัครสมาชิก + เช็กเมลซ้ำ + ยืนยันเมล ---
        document.getElementById('btn-register').addEventListener('click', async () => {
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-password').value;
            const confirmPass = document.getElementById('reg-confirm-password').value;

            if (!username || !email || !pass) return alert("กรุณากรอกข้อมูลให้ครบทุกช่อง");
            if (pass !== confirmPass) return alert("รหัสผ่านไม่ตรงกัน!");

            try {
                // 1. สร้างบัญชี
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // 2. บันทึกชื่อลง Profile และ Database
                await updateProfile(user, { displayName: username });
                await set(ref(db, 'users/' + user.uid), {
                    username: username,
                    email: email,
                    createdAt: new Date().toISOString()
                });

                // 3. ส่งอีเมลยืนยัน
                await sendEmailVerification(user);
                
                alert("สมัครสำเร็จ! อีเมลนี้ใช้งานได้\nระบบได้ส่งลิงก์ยืนยันไปที่ " + email + " แล้ว (โปรดเช็กในเมลขยะด้วย)");
                
                await signOut(auth);
                toggleForm(); 

            } catch (error) {
                // เช็กว่าอีเมลซ้ำหรือไม่
                if (error.code === 'auth/email-already-in-use') {
                    alert("ขออภัย: อีเมลนี้ถูกใช้งานโดยสมาชิกท่านอื่นแล้วครับ");
                } else if (error.code === 'auth/weak-password') {
                    alert("รหัสผ่านต้องมีความยาวอย่างน้อย 6 ตัวอักษร");
                } else {
                    alert("เกิดข้อผิดพลาด: " + error.message);
                }
            }
        });

        // --- ระบบเข้าสู่ระบบ ---
        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                if (user.emailVerified) {
                    alert("เข้าสู่ระบบสำเร็จ! สวัสดีคุณ " + (user.displayName || user.email));
                    // window.location.href = "dashboard.html"; 
                } else {
                    alert("คุณยังไม่ได้กดยืนยันอีเมล! โปรดตรวจสอบใน Inbox ของคุณ");
                    await signOut(auth);
                }
            } catch (error) {
                alert("อีเมลหรือรหัสผ่านไม่ถูกต้อง");
            }
        });
    </script>
</body>
</html>
