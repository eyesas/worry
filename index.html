<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Web Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #313338; color: white; font-family: 'Kanit', sans-serif; transition: 0.3s; }
        .discord-card { background-color: #313338; box-shadow: 0 8px 16px rgba(0,0,0,0.5); border-radius: 8px; }
        .input-field { background-color: #1e1f22; border: none; color: #dbdee1; }
        .input-field:focus { outline: 2px solid #5865f2; }
        .btn-primary { background-color: #5865f2; color: white; font-weight: bold; transition: 0.2s; }
        .btn-primary:hover { background-color: #4752c4; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="auth-section" class="discord-card p-8 w-full max-w-[480px]">
        <div id="login-box">
            <h2 class="text-2xl font-bold text-center mb-2">ยินดีต้อนรับกลับมา!</h2>
            <p class="text-[#b5bac1] text-center mb-8">เราตื่นเต้นมากที่ได้พบคุณอีกครั้ง!</p>
            
            <div class="mb-4 text-left">
                <label class="block text-xs font-bold uppercase text-[#b5bac1] mb-2">อีเมล</label>
                <input type="email" id="email" class="input-field w-full p-2.5 rounded">
            </div>
            <div class="mb-6 text-left">
                <label class="block text-xs font-bold uppercase text-[#b5bac1] mb-2">รหัสผ่าน</label>
                <input type="password" id="password" class="input-field w-full p-2.5 rounded">
            </div>
            
            <button id="btnLogin" class="btn-primary w-full py-3 rounded mb-2">เข้าสู่ระบบ</button>
            <p class="text-sm text-[#b5bac1]">ต้องการบัญชีใช่ไหม? <a href="javascript:void(0)" onclick="toggleUI()" class="text-[#00a8fc] hover:underline">ลงทะเบียน</a></p>
        </div>

        <div id="register-box" class="hidden">
            <h2 class="text-2xl font-bold text-center mb-6">สร้างบัญชี</h2>
            <div class="mb-4 text-left">
                <label class="block text-xs font-bold uppercase text-[#b5bac1] mb-2">อีเมล</label>
                <input type="email" id="reg-email" class="input-field w-full p-2.5 rounded">
            </div>
            <div class="mb-4 text-left">
                <label class="block text-xs font-bold uppercase text-[#b5bac1] mb-2">ชื่อผู้ใช้</label>
                <input type="text" id="reg-user" class="input-field w-full p-2.5 rounded">
            </div>
            <div class="mb-6 text-left">
                <label class="block text-xs font-bold uppercase text-[#b5bac1] mb-2">รหัสผ่าน</label>
                <input type="password" id="reg-pass" class="input-field w-full p-2.5 rounded">
            </div>
            <button id="btnRegister" class="btn-primary w-full py-3 rounded mb-2">สมัครสมาชิก</button>
            <p class="text-sm text-[#b5bac1]">มีบัญชีอยู่แล้ว? <a href="javascript:void(0)" onclick="toggleUI()" class="text-[#00a8fc] hover:underline">เข้าสู่ระบบ</a></p>
        </div>
    </div>

    <div id="admin-section" class="hidden w-full max-w-5xl">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold">Admin Dashboard</h1>
            <button onclick="logout()" class="bg-[#da373c] hover:bg-[#a12829] px-4 py-2 rounded text-sm font-bold">ออกจากระบบ</button>
        </div>
        
        <div class="bg-[#2b2d31] rounded-lg overflow-hidden shadow-xl border border-gray-700">
            <table class="w-full text-left">
                <thead class="bg-[#1e1f22] text-[#b5bac1] text-xs uppercase">
                    <tr>
                        <th class="p-4">Username</th>
                        <th class="p-4">Email</th>
                        <th class="p-4">Registered Date</th>
                    </tr>
                </thead>
                <tbody id="user-list" class="divide-y divide-gray-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyC5HWgNuzuK7nZRWP01hDaxcLfy2GWjt18",
            authDomain: "bestwev-af0c6.firebaseapp.com",
            projectId: "bestwev-af0c6",
            storageBucket: "bestwev-af0c6.firebasestorage.app",
            messagingSenderId: "114869261413",
            appId: "1:114869261413:web:c2f7b34e75a03d7902a28c",
            measurementId: "G-DVFE8XJT4C"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- แก้ไขตรงนี้เป็น Email ของคุณเพื่อเข้าหน้า Admin ---
        const ADMIN_EMAIL = "warayut102535@gmail.com"; 

        // สลับหน้า Login / Register
        window.toggleUI = () => {
            document.getElementById('login-box').classList.toggle('hidden');
            document.getElementById('register-box').classList.toggle('hidden');
        };

        // สมัครสมาชิก
        document.getElementById('btnRegister').onclick = async () => {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;
            const username = document.getElementById('reg-user').value;

            try {
                const res = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", res.user.uid), {
                    username: username,
                    email: email,
                    timestamp: new Date().getTime()
                });
                alert("สมัครสมาชิกเรียบร้อย!");
                location.reload();
            } catch (err) { alert(err.message); }
        };

        // เข้าสู่ระบบ
        document.getElementById('btnLogin').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) { alert("อีเมลหรือรหัสผ่านไม่ถูกต้อง"); }
        };

        // เช็คสถานะการเข้าสู่ระบบ
        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('admin-section').classList.remove('hidden');
                    loadUsers(); // โหลดรายชื่อสมาชิก
                } else {
                    alert("เข้าสู่ระบบในฐานะสมาชิกทั่วไปสำเร็จ!");
                }
            }
        });

        // ดึงข้อมูลรายชื่อสมาชิก (Real-time)
        function loadUsers() {
            const q = query(collection(db, "users"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('user-list');
                list.innerHTML = "";
                snap.forEach((doc) => {
                    const data = doc.data();
                    list.innerHTML += `
                        <tr class="hover:bg-[#35373c]">
                            <td class="p-4 font-bold text-[#5865f2]">${data.username}</td>
                            <td class="p-4">${data.email}</td>
                            <td class="p-4 text-xs text-gray-500">${new Date(data.timestamp).toLocaleString()}</td>
                        </tr>
                    `;
                });
            });
        }

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
